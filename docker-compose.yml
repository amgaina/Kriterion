services:
  db:
    image: postgres:16-alpine
    container_name: kriterion-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kriterion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kriterion_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-kriterion}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kriterion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kriterion-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kriterion-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-kriterion}:${POSTGRES_PASSWORD:-kriterion_dev_password}@db:5432/${POSTGRES_DB:-kriterion}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - BACKEND_CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-true}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME:-kriterion-submissions}
      - USE_S3_STORAGE=${USE_S3_STORAGE:-true}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - uploads_data:/tmp/kriterion/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kriterion-celery-worker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-kriterion}:${POSTGRES_PASSWORD:-kriterion_dev_password}@db:5432/${POSTGRES_DB:-kriterion}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME:-kriterion-submissions}
      - USE_S3_STORAGE=${USE_S3_STORAGE:-true}
    volumes:
      - ./backend:/app
      - uploads_data:/tmp/kriterion/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker --loglevel=info --queues=default,code_execution,grading --concurrency=4

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kriterion-celery-beat
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-kriterion}:${POSTGRES_PASSWORD:-kriterion_dev_password}@db:5432/${POSTGRES_DB:-kriterion}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      target: development
    container_name: kriterion-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_APP_NAME=Kriterion
      - NODE_ENV=development
      # Enable file watching inside Docker on macOS
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WATCHPACK_FORCE_POLLING=true
      - WDS_SOCKET_PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: npm run dev

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: kriterion-sandbox
    privileged: false
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - isolated

networks:
  default:
    driver: bridge
  isolated:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  frontend_node_modules:
  frontend_next:
